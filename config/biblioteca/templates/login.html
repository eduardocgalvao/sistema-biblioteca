{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}" />

<main>
    <div class="container">

        <!-- Logo -->
        <img src="{% static 'img/logo.png' %}" class="logo" alt="BookStack Logo" />

        <h1>Inicie sua sessão</h1>

        <div class="card">
            <h2>Bem-vindo ao BookStack! Por favor, insira suas informações para continuar.</h2>

            <hr />

            <!-- Formulário -->
            <form method="post" novalidate>
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Primeiro Nome</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Digite seu Nome"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="surname">Sobrenome</label>
                        <input
                            type="text"
                            id="surname"
                            name="surname"
                            placeholder="Digite seu Sobrenome"
                            required
                        />
                    </div>
                </div>

                <div class="form-group full">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu E-mail"
                        required
                    />
                </div>

                <button type="submit">Iniciar minha Biblioteca</button>
            </form>
        </div>
    </div>
</main>

{% endblock %}
